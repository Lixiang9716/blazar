default_job = "check"

[jobs.check]
command = ["cargo", "check", "--all-targets"]
need_stdout = false

[jobs.lint]
command = ["cargo", "clippy", "--all-targets", "--all-features", "--", "-D", "warnings"]
need_stdout = false

[jobs.test]
command = ["cargo", "nextest", "run", "--all-targets"]
need_stdout = true

[jobs.render]
command = ["cargo", "test", "--test", "chat_render", "--", "--nocapture"]
need_stdout = true
