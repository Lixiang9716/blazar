[package]
name = "blazar"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
crossterm = "0.29"
image = "0.25"
ratatui-core = "0.1"
ratatui-widgets = "0.3"
ratatui-crossterm = "0.1"
ratatui-textarea = { version = "0.9", features = ["crossterm"] }
rusqlite = "0.31"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
unicode-width = "0.2"

[dev-dependencies]
insta = "1"
proptest = "1"
